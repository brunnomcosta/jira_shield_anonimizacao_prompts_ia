<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-labelledby="title desc">
  <title id="title">SHIELD icon</title>
  <desc id="desc">Rounded square with TOTVS-inspired blue palette, central shield and export arrow accent.</desc>
  <defs>
    <linearGradient id="bg" x1="18" y1="14" x2="110" y2="114" gradientUnits="userSpaceOnUse">
