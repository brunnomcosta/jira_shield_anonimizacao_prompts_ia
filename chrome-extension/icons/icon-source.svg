      <stop offset="0.56" stop-color="#007799"/>
      <stop offset="1" stop-color="#00B8D4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(34 28) rotate(28) scale(58 42)">
