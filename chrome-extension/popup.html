<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JIRA SHIELD LGPD Export</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell popup-shell">
      <header class="hero">
        <div>
          <h1 class="brand">JIRA SHIELD</h1>
          <p class="subtitle"><b>S</b>mart <b>H</b>andler for <b>I</b>ssue <b>E</b>xport with <b>L</b>inked <b>D</b>ata</p>
        </div>
        <span class="hero-badge">Chrome</span>
      </header>

      <section class="panel stack">
        <div class="field">
          <div class="field-head">
            <label for="issue-keys">Issue keys</label>
            <button id="use-current-issue" class="ghost" type="button" hidden>Usar issue da aba</button>
          </div>
          <textarea id="issue-keys" placeholder="DMANQUALI-12311&#10;DMANQUALI-12312"></textarea>
          <div id="keys-hint" class="hint">Aceita uma ou varias chaves, separadas por espaco, virgula ou quebra de linha.</div>
        </div>

        <div class="field">
          <div class="legend">Contexto JIRA</div>
          <div class="mode-grid">
            <label class="mode-card">
              <input type="radio" name="mode" value="jira-only" checked>
              <span class="mode-title">Somente JIRA</span>
              <span class="mode-copy">Exporta só Jira + metadata. Útil para triagem rápida ou quando Zendesk não precisa entrar.</span>
            </label>
            <label class="mode-card">
              <input type="radio" name="mode" value="full">
              <span class="mode-title">Completo</span>
              <span class="mode-copy">Tenta anexar comentários Zendesk por proxy Jira, API direta e aba da issue.</span>
            </label>
          </div>
        </div>

        <div class="row actions">
          <button id="run-ai-doc" class="primary" type="button">Prompt Documentacao</button>
          <button id="run-ai-diagnostic" class="primary" type="button">Prompt Diagnostico</button>
          <button id="run-ai-diagnostic-sources" class="primary" type="button">Prompt Diagnostico + Contexto Fontes</button>
          <button id="run-export" class="secondary" type="button">Exportar</button>
          <button id="open-options" class="ghost" type="button">Configurar</button>
        </div>

        <div id="status" class="status"></div>

        <div id="source-preview" class="source-preview" hidden>
          <div class="source-preview-header">
            <span class="source-preview-title">Fontes locais encontradas</span>
            <span id="source-preview-badge" class="pill"></span>
          </div>
          <div id="source-preview-body" class="source-preview-body"></div>
          <div class="row source-preview-actions">
            <button id="source-preview-confirm" class="primary" type="button">Gerar prompt</button>
            <button id="source-preview-cancel" class="ghost" type="button">Cancelar</button>
          </div>
        </div>

        <div id="result-summary" class="result-summary"></div>
        <div id="results" class="results-cards"></div>
      </section>

      <section class="panel stack">
        <div class="row panel-head">
          <div>
            <h2 class="section-title">Histórico recente</h2>
            <p class="section-copy">Últimas exportações registradas no storage local da extensão.</p>
          </div>
          <button id="clear-history" class="ghost" type="button">Limpar</button>
        </div>
        <div id="history" class="history-list"></div>
      </section>
    </main>

    <footer class="popup-footnote">
      <span class="footnote-label">O que sai da extensão:</span>
      <div id="capabilities" class="pill-row"></div>
    </footer>

    <script src="prompt-shared.js"></script>
    <script src="prompt-templates.js"></script>
    <script src="prompt-template-diagnostic.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
